<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarBite - Mi Cuenta</title>
  <link href="/css/output.css" rel="stylesheet">
</head>

<body class="bg-white min-h-screen flex overflow-hidden">
  <aside class="w-20 flex flex-col items-center fixed left-0 top-0 h-full z-20 bg-white border-r border-gray-100">
    <div class="w-24 h-24 flex items-center justify-center">
      <img src="/assets/images/logo_StarBite_bg.png" alt="Starbite logo" class="object-contain max-w-full h-auto">
    </div>
    <nav class="flex-1 flex flex-col items-center justify-center gap-10">
      <a href="index.html" class="nav-link text-grey hover:text-orange transition-colors" data-page="index">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      </a>
      <a href="restaurants.html" class="nav-link text-grey hover:text-orange transition-colors" data-page="restaurants">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-5a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v5"/><path d="M17.774 10.31a1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.451 0 1.12 1.12 0 0 0-1.548 0 2.5 2.5 0 0 1-3.452 0 1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.77-3.248l2.889-4.184A2 2 0 0 1 7 2h10a2 2 0 0 1 1.653.873l2.895 4.192a2.5 2.5 0 0 1-3.774 3.244"/><path d="M4 10.95V19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8.05"/></svg>
      </a>
    </nav>
    <div class="mt-auto mb-6">
      <a href="log_in.html" class="nav-link" data-page="account">
        <button class="text-orange hover:scale-110 transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></svg>
        </button>
      </a>
    </div>
  </aside>

  <div class="flex-1 overflow-y-auto py-2 pr-2 pl-20">
    <div class="bg-white-blue rounded-3xl shadow-2xl w-full h-full flex flex-col overflow-hidden">
      <div class="bg-orange h-9 w-full"></div>
      <div class="flex-1 overflow-y-auto p-8">

        <!-- Header usuario — todos los hijos dentro del mismo flex -->
        <div class="flex items-center gap-6 mb-8">

          <div class="relative flex-shrink-0">
            <div id="avatar-circle" class="w-20 h-20 rounded-full bg-orange flex items-center justify-center text-white text-3xl font-bold shadow-lg cursor-default">U</div>
          </div>

          <div class="flex-1 min-w-0">
            <h1 id="header-nombre" class="text-2xl font-bold text-black truncate">Cargando...</h1>
            <p id="header-correo" class="text-grey text-sm font-garet truncate">-</p>
          </div>

          <button onclick="cerrarSesion()"
            class="flex-shrink-0 flex items-center gap-2 text-grey hover:text-red-500 transition-colors text-sm font-garet font-bold">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            Cerrar sesión
          </button>

        </div>

        <!-- Tabs -->
        <div class="flex gap-2 mb-6">
          <button class="tab-btn active px-5 py-2 rounded-full font-garet font-bold text-sm" onclick="switchTab('perfil', this)">Mi perfil</button>
          <button class="tab-btn px-5 py-2 rounded-full font-garet font-bold text-sm" onclick="switchTab('resenas', this)">Mis reseñas</button>
          <button class="tab-btn px-5 py-2 rounded-full font-garet font-bold text-sm" onclick="switchTab('guardados', this)">Guardados</button>
        </div>

        <!-- Tab: Perfil -->
        <div id="tab-perfil" class="tab-panel active">
          <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 max-w-lg">
            <h2 class="font-bold text-black text-lg mb-5">Datos de la cuenta</h2>
            <div class="flex flex-col gap-4">
              <div class="relative">
                <label class="absolute -top-2 left-4 text-xs text-grey bg-white px-1 font-garet">Nombre</label>
                <input id="inp-nombre" type="text"
                  class="account-input w-full border-2 border-gray-200 rounded-xl px-5 py-3 text-black text-sm font-garet transition-colors" />
              </div>
              <div class="relative">
                <label class="absolute -top-2 left-4 text-xs text-grey bg-white px-1 font-garet">Correo</label>
                <input id="inp-correo" type="email"
                  class="account-input w-full border-2 border-gray-200 rounded-xl px-5 py-3 text-black text-sm font-garet transition-colors" />
              </div>
              <div class="relative">
                <label class="absolute -top-2 left-4 text-xs text-grey bg-white px-1 font-garet">Teléfono</label>
                <input id="inp-telefono" type="tel" placeholder="Tu número"
                  class="account-input w-full border-2 border-gray-200 rounded-xl px-5 py-3 text-black text-sm font-garet transition-colors" />
              </div>
              <div class="relative">
                <label class="absolute -top-2 left-4 text-xs text-grey bg-white px-1 font-garet">Dirección</label>
                <input id="inp-direccion" type="text" placeholder="Tu dirección"
                  class="account-input w-full border-2 border-gray-200 rounded-xl px-5 py-3 text-black text-sm font-garet transition-colors" />
              </div>
              <div class="relative">
                <label class="absolute -top-2 left-4 text-xs text-grey bg-white px-1 font-garet">Nueva contraseña</label>
                <input id="inp-password" type="password" placeholder="Dejar en blanco para no cambiar"
                  class="account-input w-full border-2 border-gray-200 rounded-xl px-5 py-3 text-black text-sm font-garet transition-colors" />
              </div>
            </div>
            <div class="flex gap-3 mt-6">
              <button onclick="guardarPerfil()"
                class="bg-black text-white font-bold px-6 py-3 rounded-xl font-garet text-sm hover:bg-black/80 transition-colors">
                Guardar cambios
              </button>
              <button onclick="eliminarCuenta()"
                class="border-2 border-red-200 text-red-500 font-bold px-6 py-3 rounded-xl font-garet text-sm hover:bg-red-50 transition-colors">
                Eliminar cuenta
              </button>
            </div>
            <div id="perfil-msg" class="mt-3 text-sm font-garet hidden"></div>
          </div>
        </div>

        <!-- Tab: Reseñas -->
        <div id="tab-resenas" class="tab-panel">
          <div id="resenas-container" class="flex flex-col gap-4 max-w-2xl">
            <p class="text-grey font-garet text-sm">Cargando reseñas...</p>
          </div>
        </div>

        <!-- Tab: Guardados -->
        <div id="tab-guardados" class="tab-panel">
          <div id="guardados-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl">
            <p class="text-grey font-garet text-sm">Cargando guardados...</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="/js/account.js"></script>
</body>
</html>
