<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarBite</title>
  <link href="/css/output.css" rel="stylesheet">
  <style>
    html, body { height: 100%; }
    #home-view, #chat-view { position: absolute; inset: 0; }
    #home-view { display: flex; flex-direction: column; }
    #chat-view { display: none; flex-direction: column; }
  </style>
</head>



<body class="bg-white min-h-screen flex overflow-hidden">

  <aside class="w-20 flex flex-col items-center fixed left-0 top-0 h-full z-20 bg-white border-r border-gray-100">
    <div class="w-24 h-24 flex items-center justify-center">
      <img src="/assets/images/logo_StarBite_bg.png" alt="Starbite logo" class="object-contain max-w-full h-auto">
    </div>
    <nav class="flex-1 flex flex-col items-center justify-center gap-10">
      <a href="index.html" class="nav-link text-grey hover:text-orange transition-colors" data-page="index">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      </a>
      <a href="restaurants.html" class="nav-link text-grey hover:text-orange transition-colors" data-page="restaurants">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-5a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v5"/><path d="M17.774 10.31a1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.451 0 1.12 1.12 0 0 0-1.548 0 2.5 2.5 0 0 1-3.452 0 1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.77-3.248l2.889-4.184A2 2 0 0 1 7 2h10a2 2 0 0 1 1.653.873l2.895 4.192a2.5 2.5 0 0 1-3.774 3.244"/><path d="M4 10.95V19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8.05"/></svg>
      </a>
    </nav>
    <div class="mt-auto mb-6">
      <a href="log_in.html" class="nav-link" data-page="account">
        <button class="text-orange hover:scale-110 transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></svg>
        </button>
      </a>
    </div>
  </aside>

  

  <main class="flex-1 h-screen py-2 pr-2 pl-20 flex">
    <div class="bg-white-blue rounded-3xl shadow-2xl w-full h-full relative overflow-hidden">

      <div id="home-view">
        <div class="bg-orange h-9 w-full shrink-0"></div>
        <div class="flex-1 flex flex-col items-center justify-center gap-5" style="height: calc(100% - 36px);">
          <h1 class="font-brookshire text-orange text-[5.25rem] logo-neon tracking-tighter">StarBite</h1>
          <div class="relative flex items-center bg-white rounded-full px-5 py-3 w-[480px] shadow-sm border-4 border-white-grey">
            <input
              type="text"
              id="home-search-input"
              placeholder="¿Qué se te antoja hoy?"
              class="w-full text-center text-grey text-base outline-none bg-transparent font-garet placeholder:text-grey cursor-pointer"
              readonly
              onclick="switchToChatMode()"
            />
            <button
              onclick="switchToChatMode()"
              class="bg-orange btn-neon absolute right-3 rounded-full w-10 h-10 flex items-center justify-center shrink-0 hover:scale-105 transition-all"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div id="chat-view">
        <div class="px-6 py-4 border-b bg-white flex items-center justify-between shadow-sm" style="flex-shrink:0;">
          <div class="flex items-center gap-3">
            <!-- Quita el onclick y el cursor-pointer -->

            <div id="avatar-circle" class="w-20 h-20 rounded-full bg-orange flex items-center justify-center text-white text-3xl font-bold shadow-lg">U</div>
            <span class="font-garet font-bold text-orange text-lg">StarBite AI</span>
          </div>
          <span class="text-xs text-grey bg-white-grey px-3 py-1 rounded-full font-garet">Gemini 2.5 Flash</span>
        </div>

        <div id="chat-box" class="overflow-y-auto p-6 flex flex-col gap-4" style="flex:1; min-height:0;">
          <div class="flex justify-start">
            <div class="bg-white text-gray-800 px-5 py-3 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 max-w-[75%] font-garet text-sm leading-relaxed">
              ¡Hola! 👋 ¿Qué tipo de comida o restaurante estás buscando hoy en Medellín?
            </div>
          </div>
        </div>

        <div class="p-4 bg-white border-t border-gray-100" style="flex-shrink:0;">
          <div class="max-w-3xl mx-auto relative flex items-center bg-gray-50 rounded-2xl px-4 py-3 border border-gray-200">
            <input
              type="text"
              id="user-input"
              placeholder="Pregúntale a StarBite..."
              class="w-full text-gray-700 text-sm outline-none bg-transparent pr-12 pl-2 font-garet"
              onkeydown="if(event.key === 'Enter') sendMessage()"
            />
            <button
              onclick="sendMessage()"
              class="absolute right-3 bg-orange text-white p-2 rounded-xl hover:opacity-90 transition-all flex items-center justify-center shadow"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="/js/main.js"></script>
</body>
</html>
